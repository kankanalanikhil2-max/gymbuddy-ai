# AWS App Runner configuration (required when "Use a configuration file" is selected)
# Runtime must be nodejs18 or nodejs22. Do NOT choose "Docker" in the console when using this file.
version: 1.0
runtime: nodejs22
build:
  commands:
    build:
      - npm ci
      - npm run build
run:
  runtime-version: "22"
  command: npm start
  network:
    port: 3000
